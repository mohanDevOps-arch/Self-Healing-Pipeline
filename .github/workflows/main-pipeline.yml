name: MAIN Pipeline - Human Gated AI Triage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  main-validation:
    name: MAIN validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite and save logs
        run: |
          set -o pipefail
          mkdir -p ci-logs
          pytest test_app.py -v --cov=app --cov-fail-under=80 2>&1 | tee ci-logs/main.log
          exit ${PIPESTATUS[0]}

      - name: Upload MAIN logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-ci-logs
          path: ci-logs/main.log

  ai-analyzer:
    name: AI analyzer
    runs-on: ubuntu-latest
    needs: main-validation
    if: always() && needs.main-validation.result == 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download MAIN logs
        uses: actions/download-artifact@v4
        with:
          name: main-ci-logs
          path: ci-logs

      - name: Analyze failure with OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: |
          python scripts/analyze_ci_failure.py --stage main --log-file ci-logs/main.log --mode real_ai

      - name: Upload AI production triage
        uses: actions/upload-artifact@v4
        with:
          name: main-ai-triage
          path: ai-analysis.json

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: main-validation
    if: needs.main-validation.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t user-api:latest .
          docker build -t user-api:${{ github.sha }} .

      - name: List Docker images
        run: docker images | grep user-api

  docker-security:
    name: Docker security
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dockerfile linting
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          FLASK_ENV: testing
          DB_HOST: localhost
        run: |
          pytest test_app.py -v

      - name: Start Flask app and run health check
        env:
          FLASK_ENV: production
          DB_HOST: localhost
          PORT: 5000
        run: |
          python app.py &
          sleep 2
          curl -f http://localhost:5000/health

  deployment-readiness:
    name: Deployment readiness
    runs-on: ubuntu-latest
    needs: [docker-security, integration-tests]

    steps:
      - name: Verify production approval gate
        run: |
          echo "MAIN branch is human-gated."
          echo "AI may summarize failures, but production deployment requires approval."

      - name: Generate deployment report
        run: |
          echo "=== DEPLOYMENT READINESS REPORT ===" > deployment-report.txt
          echo "Build Date: $(date)" >> deployment-report.txt
          echo "Commit: ${{ github.sha }}" >> deployment-report.txt
          echo "Branch: ${{ github.ref }}" >> deployment-report.txt
          echo "Status: Ready for human-approved deployment" >> deployment-report.txt
          cat deployment-report.txt

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.txt
