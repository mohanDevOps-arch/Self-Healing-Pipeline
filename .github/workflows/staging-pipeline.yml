name: STAGING Pipeline - AI Test Repair

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  staging-validation:
    name: STAGING validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run staging checks and save logs
        run: |
          set -o pipefail
          mkdir -p ci-logs
          pytest test_app.py -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80 2>&1 | tee ci-logs/staging.log
          exit ${PIPESTATUS[0]}

      - name: Upload STAGING logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-ci-logs
          path: ci-logs/staging.log

  ai-analyzer:
    name: AI analyzer
    runs-on: ubuntu-latest
    needs: staging-validation
    if: always() && needs.staging-validation.result == 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download STAGING logs
        uses: actions/download-artifact@v4
        with:
          name: staging-ci-logs
          path: ci-logs

      - name: Analyze failure with OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: |
          python scripts/analyze_ci_failure.py --stage staging --log-file ci-logs/staging.log --mode real_ai

      - name: Upload AI analysis
        uses: actions/upload-artifact@v4
        with:
          name: staging-ai-analysis
          path: ai-analysis.json

  ai-repair-pr:
    name: AI repair PR after positive report
    runs-on: ubuntu-latest
    needs: ai-analyzer
    if: always() && needs.ai-analyzer.result == 'success' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download AI analysis
        uses: actions/download-artifact@v4
        with:
          name: staging-ai-analysis
          path: .

      - name: Apply STAGING AI patch when confidence is at least 90 percent
        run: |
          python scripts/apply_ai_patch.py --stage staging --analysis ai-analysis.json
          pip install -r requirements.txt
          pytest test_app.py -v --cov=app --cov-fail-under=80

      - name: Create STAGING repair PR
        id: staging-pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/staging-repair-${{ github.run_id }}
          title: "AI STAGING repair after positive report"
          commit-message: "AI STAGING repair"
          body-path: ai-analysis.json
          delete-branch: true

      - name: Auto-merge STAGING repair PR
        if: steps.staging-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.staging-pr.outputs.pull-request-number }} --squash --auto

  security-scan:
    name: STAGING security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run bandit security scan
        run: |
          bandit -r app.py test_app.py -f json -o bandit-report.json
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: |
          safety check --json
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
